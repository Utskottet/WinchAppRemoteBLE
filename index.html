<!DOCTYPE html>
<html>
<head>
  <title>Winch Remote</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Arial', sans-serif;
      background: #1a1a1a;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .main-content {
      padding: 8px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Compact header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      padding: 4px 10px;
      background: #2a2a2a;
      border-radius: 5px;
      min-height: 40px;
      flex-wrap: wrap;
      gap: 5px;
    }
    
    .header h1 {
      font-size: 16px;
      font-weight: normal;
    }
    
    .header .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .header button {
      background: #2196F3;
      color: white;
      border: none;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
    }
    
    .header button:disabled {
      background: #555;
      cursor: not-allowed;
    }
    
    .header button:hover:not(:disabled) {
      background: #1976D2;
    }
    
    .fullscreen-btn {
      background: #FF9800 !important;
    }
    
    .fullscreen-btn:hover {
      background: #F57C00 !important;
    }
    
    .status {
      font-size: 10px;
      color: #888;
    }
    
    /* Main content area - responsive */
    .content {
      flex: 1;
      display: grid;
      gap: 8px;
      overflow: hidden;
    }
    
    /* Landscape layout */
    @media (orientation: landscape) {
      .content {
        grid-template-columns: 0.8fr 2fr 1fr;
      }
    }
    
    /* Portrait layout */
    @media (orientation: portrait) {
      .content {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto 1fr;
        overflow-y: auto;
      }
      
      .middle-column {
        grid-template-columns: 1fr 1fr !important;
        grid-template-rows: unset !important;
      }
      
      .state-value {
        font-size: 60px !important;
      }
    }
    
    /* Left column - STATE (big) */
    .left-column {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .state-display {
      flex: 1;
      background: #2a2a2a;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 10px;
      min-height: 120px;
    }
    
    .state-label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 5px;
    }
    
    .state-value {
      font-size: 100px;
      font-weight: bold;
      color: #4CAF50;
      line-height: 0.9;
      text-shadow: 0 0 20px rgba(76, 175, 80, 0.3);
    }
    
    /* Middle column - Medium values in 2x3 grid */
    .middle-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 8px;
    }
    
    .medium-card {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 80px;
    }
    
    .medium-label {
      font-size: 11px;
      color: #aaa;
      margin-bottom: 4px;
    }
    
    .medium-value {
      font-size: 38px;
      font-weight: bold;
      color: #fff;
      line-height: 1;
    }
    
    .medium-unit {
      font-size: 18px;
      color: #888;
      margin-left: 3px;
    }
    
    .line-state {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 15px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 4px;
    }
    
    .line-state.ready { background: #4CAF50; color: white; }
    .line-state.armed { background: #FF9800; color: white; }
    .line-state.stopped { background: #f44336; color: white; }
    
    /* Right column - Standard values */
    .right-column {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .standard-card {
      background: #2a2a2a;
      padding: 6px 10px;
      border-radius: 6px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }
    
    .standard-label {
      font-size: 9px;
      color: #aaa;
      margin-bottom: 2px;
    }
    
    .standard-value {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      line-height: 1;
    }
    
    .standard-unit {
      font-size: 11px;
      color: #888;
      margin-left: 2px;
    }
    
    /* Battery displays */
    .battery-container {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .battery-bar {
      width: 35px;
      height: 16px;
      border: 2px solid #fff;
      border-radius: 3px;
      position: relative;
      overflow: hidden;
    }
    
    .battery-fill {
      height: 100%;
      background: linear-gradient(to right, #4CAF50, #8BC34A);
      transition: width 0.3s ease;
    }
    
    .battery-fill.low {
      background: linear-gradient(to right, #f44336, #FF5722);
    }
    
    .charging-icon {
      font-size: 14px;
      color: #FFC107;
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Future values (grayed out) */
    .future-card {
      opacity: 0.4;
      position: relative;
    }
    
    .future-label {
      font-size: 7px;
      color: #FFC107;
      position: absolute;
      top: 2px;
      right: 4px;
    }
  </style>
</head>
<body>
  <div class="main-content">
    <div class="header">
      <h1>🪂 Winch Remote</h1>
      <div class="controls">
        <button onclick="connect()" id="connectBtn">Connect Winch</button>
        <button onclick="disconnect()" id="disconnectBtn" disabled>Disconnect Winch</button>
        <button onclick="connectXCT()" id="xctConnectBtn">Connect XCT</button>
        <button onclick="disconnectXCT()" id="xctDisconnectBtn" disabled>Disconnect XCT</button>
        <button onclick="toggleFullscreen()" class="fullscreen-btn" id="fullscreenBtn">⛶ Full</button>
        <span class="status" id="status">Winch: not connected</span>
        <span class="status" id="xctStatus">XCT: not connected</span>
        <span class="status" id="xctRaw" style="color:#FFC107;max-width:300px;overflow:hidden;white-space:nowrap;"></span>
      </div>
    </div>
    
    <div class="content">
      <!-- LEFT: State -->
      <div class="left-column">
        <div class="state-display">
          <div class="state-label">STATE</div>
          <div class="state-value" id="state">-</div>
        </div>
      </div>
      
      <!-- MIDDLE: Medium values 2x2 -->
      <div class="middle-column">
        <div class="medium-card">
          <div class="medium-label">Line Distance</div>
          <div>
            <span class="medium-value" id="lineDistance">0</span>
            <span class="medium-unit">m</span>
          </div>
        </div>
        
        <div class="medium-card">
          <div class="medium-label">Line State</div>
          <div class="line-state ready" id="lineState">READY</div>
        </div>
        
        <div class="medium-card">
          <div class="medium-label">Current</div>
          <div>
            <span class="medium-value" id="amps">0</span>
            <span class="medium-unit">A</span>
          </div>
        </div>
        
        <div class="medium-card">
          <div class="medium-label">Controller Temp</div>
          <div>
            <span class="medium-value" id="temp">0</span>
            <span class="medium-unit">°C</span>
          </div>
        </div>

        <div class="medium-card">
          <div class="medium-label">Speed</div>
          <div>
            <span class="medium-value" id="xctSpeed">-</span>
            <span class="medium-unit">km/h</span>
          </div>
        </div>

        <div class="medium-card">
          <div class="medium-label">ALT</div>
          <div>
            <span class="medium-value" id="xctAlt">-</span>
            <span class="medium-unit">m</span>
          </div>
        </div>
      </div>
      
      <!-- RIGHT: Standard values -->
      <div class="right-column">
        <div class="standard-card">
          <div class="standard-label">RSSI</div>
          <div>
            <span class="standard-value" id="rssi">0</span>
            <span class="standard-unit">dBm</span>
          </div>
        </div>
        
        <div class="standard-card">
          <div class="standard-label">Lost Packages</div>
          <div>
            <span class="standard-value" id="lostPackages">0</span>
          </div>
        </div>
        
        <div class="standard-card">
          <div class="standard-label">Winch Battery</div>
          <div class="battery-container">
            <div class="battery-bar">
              <div class="battery-fill" id="winchBatteryBar" style="width: 0%"></div>
            </div>
            <span class="standard-value" id="winchBattery">0</span>
            <span class="standard-unit">%</span>
          </div>
        </div>
        
        <div class="standard-card">
          <div class="standard-label">Remote Battery</div>
          <div class="battery-container">
            <div class="battery-bar">
              <div class="battery-fill" id="remoteBatteryBar" style="width: 0%"></div>
            </div>
            <span class="standard-value" id="remoteBattery">0</span>
            <span class="standard-unit">%</span>
            <span class="charging-icon" id="chargingIcon" style="display: none;">⚡</span>
          </div>
        </div>
        
        <div class="standard-card">
          <div class="standard-label">SNR</div>
          <div>
            <span class="standard-value" id="snr">0</span>
            <span class="standard-unit">dB</span>
          </div>
        </div>

        <div class="standard-card">
          <div class="standard-label">Winch Voltage</div>
          <div>
            <span class="standard-value" id="vescVoltage">0</span>
            <span class="standard-unit">V</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── Winch BLE (NUS) ──────────────────────────────────────────────────────
    const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const CHAR_TX = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';
    const CHAR_RX = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

    let device, server, txChar, rxChar;

    // ── XC Tracer BLE (0xFFE0 / 0xFFE1) ─────────────────────────────────────
    const XCT_SERVICE_UUID = '0000ffe0-0000-1000-8000-00805f9b34fb';
    const XCT_CHAR_UUID    = '0000ffe1-0000-1000-8000-00805f9b34fb';

    let xctDevice, xctServer, xctChar;
    let xctBuffer = '';
    
    const lineStateNames = ['READY', 'ARMED', 'STOPPED'];
    const lineStateClasses = ['ready', 'armed', 'stopped'];

    async function connect() {
      try {
        updateStatus('Scanning...');
        
        device = await navigator.bluetooth.requestDevice({
          filters: [{ namePrefix: 'Winch' }],
          optionalServices: [SERVICE_UUID]
        });
        
        updateStatus('Connecting...');
        
        server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        txChar = await service.getCharacteristic(CHAR_TX);
        rxChar = await service.getCharacteristic(CHAR_RX);
        
        await txChar.startNotifications();
        txChar.addEventListener('characteristicvaluechanged', handleTelemetry);
        
        document.getElementById('connectBtn').disabled = true;
        document.getElementById('disconnectBtn').disabled = false;

        updateStatus('Winch: connected');
      } catch(e) {
        updateStatus('Winch: failed');
        console.error(e);
      }
    }

    function disconnect() {
      if (device && device.gatt.connected) {
        device.gatt.disconnect();
        document.getElementById('connectBtn').disabled = false;
        document.getElementById('disconnectBtn').disabled = true;
        updateStatus('Winch: disconnected');
      }
    }

    // ── XC Tracer connect / disconnect ───────────────────────────────────────
    async function connectXCT() {
      try {
        updateXCTStatus('Scanning...');
        xctDevice = await navigator.bluetooth.requestDevice({
          filters: [{ namePrefix: 'XCT' }],
          optionalServices: [XCT_SERVICE_UUID]
        });
        updateXCTStatus('Connecting...');
        xctServer = await xctDevice.gatt.connect();
        const service = await xctServer.getPrimaryService(XCT_SERVICE_UUID);
        xctChar = await service.getCharacteristic(XCT_CHAR_UUID);
        await xctChar.startNotifications();
        xctChar.addEventListener('characteristicvaluechanged', handleXCTData);
        document.getElementById('xctConnectBtn').disabled = true;
        document.getElementById('xctDisconnectBtn').disabled = false;
        updateXCTStatus('XCT: connected');
      } catch(e) {
        updateXCTStatus('XCT: failed');
        console.error(e);
      }
    }

    function disconnectXCT() {
      if (xctDevice && xctDevice.gatt.connected) {
        xctDevice.gatt.disconnect();
        document.getElementById('xctConnectBtn').disabled = false;
        document.getElementById('xctDisconnectBtn').disabled = true;
        updateXCTStatus('XCT: disconnected');
      }
    }

    // ── XC Tracer data handler ────────────────────────────────────────────────
    function handleXCTData(event) {
      xctBuffer += new TextDecoder().decode(new Uint8Array(event.target.value.buffer));
      document.getElementById('xctRaw').textContent = 'raw: ' + xctBuffer.slice(-60);
      let nl;
      while ((nl = xctBuffer.indexOf('\n')) !== -1) {
        const line = xctBuffer.slice(0, nl).trim();
        xctBuffer = xctBuffer.slice(nl + 1);
        if (line) {
          document.getElementById('xctRaw').textContent = line;
          parseLXWP0(line);
        }
      }
    }

    // ── LXWP0 parser ─────────────────────────────────────────────────────────
    // $LXWP0,logger_stored,airspeed_kmh,baro_alt_m,vario_ms,...*checksum
    function parseLXWP0(line) {
      if (!line.startsWith('$LXWP0')) return;
      const star = line.indexOf('*');
      const fields = (star !== -1 ? line.slice(0, star) : line).split(',');
      if (fields.length < 4) return;
      const speed = parseFloat(fields[2]);
      const alt   = parseFloat(fields[3]);
      if (!isNaN(speed)) document.getElementById('xctSpeed').textContent = speed.toFixed(1);
      if (!isNaN(alt))   document.getElementById('xctAlt').textContent   = Math.round(alt);
    }

    function updateXCTStatus(msg) {
      document.getElementById('xctStatus').textContent = msg;
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        document.getElementById('fullscreenBtn').textContent = '⛶ Exit';
      } else {
        document.exitFullscreen();
        document.getElementById('fullscreenBtn').textContent = '⛶ Full';
      }
    }
    
    // Update button text when fullscreen changes (e.g., via ESC key)
    document.addEventListener('fullscreenchange', () => {
      if (document.fullscreenElement) {
        document.getElementById('fullscreenBtn').textContent = '⛶ Exit';
      } else {
        document.getElementById('fullscreenBtn').textContent = '⛶ Full';
      }
    });

    function handleTelemetry(event) {
      const data = new Uint8Array(event.target.value.buffer);

      const state        = data[0];
      const lineDistance = (data[1] << 8) | data[2];
      const lineState    = data[3];
      const amps_x10     = (data[4] << 8) | data[5];  // divide by 10 for Amps
      const temp         = data[6];
      const rssi         = data[7] > 127 ? data[7] - 256 : data[7];
      const lostPct      = data[9];                    // packet loss %
      const winchBattery = data[10];
      const remoteBattery = data[11];
      const charging     = data[12] === 1;
      const snr          = data[13] > 127 ? data[13] - 256 : data[13];
      const vescVolt_dV  = (data[14] << 8) | data[15]; // divide by 10 for Volts

      document.getElementById('state').textContent        = state;
      document.getElementById('lineDistance').textContent = lineDistance;
      document.getElementById('amps').textContent         = (amps_x10 / 10).toFixed(1);
      document.getElementById('temp').textContent         = temp > 0 ? temp : 'N/A';
      document.getElementById('rssi').textContent         = rssi;
      document.getElementById('lostPackages').textContent = lostPct + '%';
      document.getElementById('winchBattery').textContent = winchBattery;
      document.getElementById('remoteBattery').textContent = remoteBattery;
      document.getElementById('snr').textContent          = snr;
      document.getElementById('vescVoltage').textContent  = (vescVolt_dV / 10).toFixed(1);

      const lineStateEl = document.getElementById('lineState');
      lineStateEl.textContent = lineStateNames[lineState] || 'UNKNOWN';
      lineStateEl.className   = 'line-state ' + (lineStateClasses[lineState] || '');

      const winchBar = document.getElementById('winchBatteryBar');
      winchBar.style.width = winchBattery + '%';
      winchBar.className   = winchBattery < 20 ? 'battery-fill low' : 'battery-fill';

      const remoteBar = document.getElementById('remoteBatteryBar');
      remoteBar.style.width = remoteBattery + '%';
      remoteBar.className   = remoteBattery < 20 ? 'battery-fill low' : 'battery-fill';

      document.getElementById('chargingIcon').style.display = charging ? 'inline' : 'none';
    }

    function updateStatus(msg) {
      document.getElementById('status').textContent = msg;
    }
  </script>
</body>
</html>
