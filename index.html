<!DOCTYPE html>
<html>
<head>
  <title>Winch Remote</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    button { padding: 10px 20px; margin: 5px; font-size: 16px; }
    pre { background: #f0f0f0; padding: 10px; }
  </style>
</head>
<body>
  <h1>Winch Remote BLE</h1>
  <button onclick="connect()">Connect to Winch</button>
  <button onclick="disconnect()" disabled id="disconnectBtn">Disconnect</button>
  <br><br>
  <button onclick="sendCommand(1)" disabled id="startBtn">Start</button>
  <button onclick="sendCommand(0)" disabled id="stopBtn">Stop</button>
  
  <h3>Telemetry:</h3>
  <pre id="telemetry">Not connected</pre>
  
  <h3>Debug Log:</h3>
  <pre id="log"></pre>

  <script>
    const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const CHAR_TX = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';
    const CHAR_RX = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
    
    let device, server, txChar, rxChar;

    function log(msg) {
      document.getElementById('log').textContent += new Date().toLocaleTimeString() + ': ' + msg + '\n';
      console.log(msg);
    }

    async function connect() {
      try {
        log('Requesting device...');
        device = await navigator.bluetooth.requestDevice({
          filters: [{ namePrefix: 'Winch' }],
          optionalServices: [SERVICE_UUID]
        });
        
        log('Found: ' + device.name);
        
        server = await device.gatt.connect();
        log('Connected to GATT');
        
        const service = await server.getPrimaryService(SERVICE_UUID);
        log('Got service');
        
        txChar = await service.getCharacteristic(CHAR_TX);
        log('Got TX characteristic');
        
        rxChar = await service.getCharacteristic(CHAR_RX);
        log('Got RX characteristic');
        
        await txChar.startNotifications();
        txChar.addEventListener('characteristicvaluechanged', handleData);
        log('Subscribed to notifications');
        
        document.getElementById('telemetry').textContent = 'Connected!';
        document.getElementById('disconnectBtn').disabled = false;
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = false;
        
        log('✓ SUCCESS - Ready!');
      } catch(e) {
        log('✗ ERROR: ' + e.toString());
      }
    }

    function disconnect() {
      if (device && device.gatt.connected) {
        device.gatt.disconnect();
        log('Disconnected');
        document.getElementById('telemetry').textContent = 'Disconnected';
        document.getElementById('disconnectBtn').disabled = true;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = true;
      }
    }

    function handleData(event) {
      const data = new Uint8Array(event.target.value.buffer);
      document.getElementById('telemetry').textContent = 
        'Data[0]: ' + data[0] + '\n' +
        'Raw: ' + Array.from(data).join(', ');
    }

    async function sendCommand(cmd) {
      try {
        const data = new Uint8Array([cmd]);
        await rxChar.writeValue(data);
        log('Sent command: ' + cmd);
      } catch(e) {
        log('Send error: ' + e);
      }
    }
  </script>
</body>
</html>
