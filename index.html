<!DOCTYPE html>
<html>
<head>
  <title>Winch Remote PoC</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    button { padding: 10px 20px; margin: 5px; font-size: 16px; }
    #telemetry { margin-top: 20px; padding: 10px; background: #f0f0f0; }
  </style>
</head>
<body>
  <h1>Winch Remote BLE PoC</h1>
  <button id="connect">Connect</button>
  <button id="disconnect" disabled>Disconnect</button>
  
  <div id="telemetry">
    <h3>Telemetry:</h3>
    <pre id="data">Not connected</pre>
  </div>
  
  <div>
    <h3>Commands:</h3>
    <button id="start" disabled>Start Winch</button>
    <button id="stop" disabled>Stop Winch</button>
  </div>

  <script>
    const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const CHAR_UUID_TX = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';
    const CHAR_UUID_RX = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
    
    let device, server, service, txChar, rxChar;
    
    document.getElementById('connect').onclick = async () => {
      try {
        device = await navigator.bluetooth.requestDevice({
          filters: [{ name: 'WinchRemote' }],
          optionalServices: [SERVICE_UUID]
        });
        
        server = await device.gatt.connect();
        service = await server.getPrimaryService(SERVICE_UUID);
        txChar = await service.getCharacteristic(CHAR_UUID_TX);
        rxChar = await service.getCharacteristic(CHAR_UUID_RX);
        
        // Subscribe to notifications
        await txChar.startNotifications();
        txChar.addEventListener('characteristicvaluechanged', handleTelemetry);
        
        document.getElementById('data').textContent = 'Connected!';
        enableButtons(true);
      } catch(err) {
        console.error('Connection failed:', err);
      }
    };
    
    document.getElementById('disconnect').onclick = () => {
      if (device && device.gatt.connected) {
        device.gatt.disconnect();
        enableButtons(false);
        document.getElementById('data').textContent = 'Disconnected';
      }
    };
    
    function handleTelemetry(event) {
      const value = event.target.value;
      const data = new Uint8Array(value.buffer);
      document.getElementById('data').textContent = 
        `Data[0]: ${data[0]}\n` +
        `Raw: ${Array.from(data).join(', ')}`;
    }
    
    document.getElementById('start').onclick = async () => {
      const cmd = new Uint8Array([0x01]); // Start command
      await rxChar.writeValue(cmd);
    };
    
    document.getElementById('stop').onclick = async () => {
      const cmd = new Uint8Array([0x00]); // Stop command
      await rxChar.writeValue(cmd);
    };
    
    function enableButtons(connected) {
      document.getElementById('connect').disabled = connected;
      document.getElementById('disconnect').disabled = !connected;
      document.getElementById('start').disabled = !connected;
      document.getElementById('stop').disabled = !connected;
    }
  </script>
</body>
</html>
